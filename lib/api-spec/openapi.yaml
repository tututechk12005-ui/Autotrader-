openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FLOWSIGNALS AI - Crypto Trading Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard stats
  - name: demo
    description: Demo trading account
  - name: signals
    description: AI trading signals
  - name: scanner
    description: Pair scanner
  - name: bot
    description: Auto trading bot
  - name: trades
    description: Trade history
  - name: binance
    description: Binance API keys
  - name: referral
    description: Referral system
  - name: admin
    description: Admin operations
  - name: settings
    description: User settings / risk management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Dashboard
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # Demo Account
  /demo/account:
    get:
      operationId: getDemoAccount
      tags: [demo]
      summary: Get demo account info
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoAccount"

  /demo/trade:
    post:
      operationId: placeDemoTrade
      tags: [demo]
      summary: Place a demo trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoTradeInput"
      responses:
        "201":
          description: Trade placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

  /demo/trades:
    get:
      operationId: getDemoTrades
      tags: [demo]
      summary: Get demo trade history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /demo/trades/{id}/close:
    post:
      operationId: closeDemoTrade
      tags: [demo]
      summary: Close an open demo trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

  # Signals
  /signals:
    get:
      operationId: getSignals
      tags: [signals]
      summary: Get AI trading signals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /signals/generate:
    post:
      operationId: generateSignals
      tags: [signals]
      summary: Trigger signal generation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  # Scanner
  /scanner/pairs:
    get:
      operationId: getScannerPairs
      tags: [scanner]
      summary: Get ranked pair opportunities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PairScan"

  # Bot
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/toggle:
    post:
      operationId: toggleBot
      tags: [bot]
      summary: Toggle bot on/off
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotToggleInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  # Trades
  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get real trade history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  # Binance API Keys
  /binance/keys:
    get:
      operationId: getBinanceKeys
      tags: [binance]
      summary: Get stored Binance key info (masked)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceKeyInfo"
    post:
      operationId: saveBinanceKeys
      tags: [binance]
      summary: Save Binance API keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BinanceKeyInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceKeyInfo"
    delete:
      operationId: deleteBinanceKeys
      tags: [binance]
      summary: Delete Binance API keys
      responses:
        "204":
          description: Deleted

  /binance/balance:
    get:
      operationId: getBinanceBalance
      tags: [binance]
      summary: Get Binance account balance
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceBalance"

  # Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get user risk/strategy settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  # Referral
  /referral:
    get:
      operationId: getReferral
      tags: [referral]
      summary: Get referral info
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  # Admin
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Admin - list all users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/toggle:
    post:
      operationId: adminToggleUser
      tags: [admin]
      summary: Admin - enable/disable user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/trades:
    get:
      operationId: adminGetTrades
      tags: [admin]
      summary: Admin - all trades
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /admin/signals:
    get:
      operationId: adminGetSignals
      tags: [admin]
      summary: Admin - all signals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - platform stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/bot/toggle:
    post:
      operationId: adminToggleBot
      tags: [admin]
      summary: Admin - globally enable/disable bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotToggleInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    RegisterInput:
      type: object
      required: [email, password, username]
      properties:
        email:
          type: string
        password:
          type: string
        username:
          type: string
        referralCode:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, username, role, isActive, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean
        referralCode:
          type: ["string", "null"]
        createdAt:
          type: string

    DashboardStats:
      type: object
      required: [totalBalance, dailyProfit, monthlyProfit, winRate, activeTrades, totalTrades, profitFactor, botActive, demoBalance]
      properties:
        totalBalance:
          type: number
        dailyProfit:
          type: number
        monthlyProfit:
          type: number
        winRate:
          type: number
        activeTrades:
          type: integer
        totalTrades:
          type: integer
        profitFactor:
          type: number
        botActive:
          type: boolean
        demoBalance:
          type: number

    DemoAccount:
      type: object
      required: [id, balance, totalProfit, totalTrades, winRate]
      properties:
        id:
          type: integer
        balance:
          type: number
        totalProfit:
          type: number
        totalTrades:
          type: integer
        winRate:
          type: number

    DemoTradeInput:
      type: object
      required: [pair, side, amount]
      properties:
        pair:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        amount:
          type: number
        stopLoss:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]

    Trade:
      type: object
      required: [id, pair, side, entryPrice, amount, status, type, createdAt]
      properties:
        id:
          type: integer
        pair:
          type: string
        side:
          type: string
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        amount:
          type: number
        profit:
          type: ["number", "null"]
        stopLoss:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]
        status:
          type: string
          enum: [OPEN, CLOSED, CANCELLED]
        type:
          type: string
          enum: [DEMO, REAL]
        createdAt:
          type: string
        closedAt:
          type: ["string", "null"]

    Signal:
      type: object
      required: [id, pair, action, confidence, entryPrice, stopLoss, takeProfit, indicators, createdAt]
      properties:
        id:
          type: integer
        pair:
          type: string
        action:
          type: string
          enum: [BUY, SELL, WAIT]
        confidence:
          type: number
        entryPrice:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        indicators:
          $ref: "#/components/schemas/Indicators"
        strategy:
          type: ["string", "null"]
        createdAt:
          type: string

    Indicators:
      type: object
      properties:
        rsi:
          type: number
        macd:
          type: number
        ema20:
          type: number
        ema50:
          type: number
        ema200:
          type: number
        volume:
          type: number
        trend:
          type: string
        trendStrength:
          type: number

    PairScan:
      type: object
      required: [pair, score, trend, signal, price, change24h]
      properties:
        pair:
          type: string
        score:
          type: number
        trend:
          type: string
        signal:
          type: string
          enum: [BUY, SELL, WAIT]
        price:
          type: number
        change24h:
          type: number

    BotStatus:
      type: object
      required: [active, strategy, totalRuntime, tradesExecuted]
      properties:
        active:
          type: boolean
        strategy:
          type: string
        totalRuntime:
          type: integer
        tradesExecuted:
          type: integer

    BotToggleInput:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        strategy:
          type: ["string", "null"]

    BinanceKeyInfo:
      type: object
      required: [hasKeys, apiKeyMasked]
      properties:
        hasKeys:
          type: boolean
        apiKeyMasked:
          type: ["string", "null"]

    BinanceKeyInput:
      type: object
      required: [apiKey, secretKey]
      properties:
        apiKey:
          type: string
        secretKey:
          type: string

    BinanceBalance:
      type: object
      required: [totalUsdt, assets]
      properties:
        totalUsdt:
          type: number
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AssetBalance"

    AssetBalance:
      type: object
      required: [asset, free, locked]
      properties:
        asset:
          type: string
        free:
          type: number
        locked:
          type: number

    UserSettings:
      type: object
      required: [id, riskPercent, stopLossPercent, takeProfitPercent, dailyDrawdownPercent, maxOpenTrades, strategy]
      properties:
        id:
          type: integer
        riskPercent:
          type: number
        stopLossPercent:
          type: number
        takeProfitPercent:
          type: number
        dailyDrawdownPercent:
          type: number
        maxOpenTrades:
          type: integer
        strategy:
          type: string
          enum: [SCALPING, SWING, TREND_FOLLOWING, SMC, ICT]

    UserSettingsInput:
      type: object
      properties:
        riskPercent:
          type: number
        stopLossPercent:
          type: number
        takeProfitPercent:
          type: number
        dailyDrawdownPercent:
          type: number
        maxOpenTrades:
          type: integer
        strategy:
          type: string
          enum: [SCALPING, SWING, TREND_FOLLOWING, SMC, ICT]

    ReferralInfo:
      type: object
      required: [referralCode, totalReferrals, totalEarnings, referrals]
      properties:
        referralCode:
          type: string
        totalReferrals:
          type: integer
        totalEarnings:
          type: number
        referrals:
          type: array
          items:
            $ref: "#/components/schemas/ReferralEntry"

    ReferralEntry:
      type: object
      required: [id, username, joinedAt, commission]
      properties:
        id:
          type: integer
        username:
          type: string
        joinedAt:
          type: string
        commission:
          type: number

    AdminStats:
      type: object
      required: [totalUsers, activeUsers, totalTrades, totalSignals, platformPnl, botGlobalActive]
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalTrades:
          type: integer
        totalSignals:
          type: integer
        platformPnl:
          type: number
        botGlobalActive:
          type: boolean
